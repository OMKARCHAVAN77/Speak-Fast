<div class="registration-page">

  <div class="top-banner  d-flex flex-column justify-content-center align-items-center">
    <h1>Complete your registration</h1>
    <p>Just one more step to start your English learning journey!</p>
  </div>

  <div class="container form-section">
    <!-- Your cards and registration form -->
    <div class="row cards-section">
      <div class="col-lg-6 mb-4">
        <div class="left-card">
          <!-- Left Content -->
          <div class="feature-card mb-4">
            <div class="d-flex align-items-center">
              <div class="icon-box">
                <img src="../../../../assets/trophy-first_icon.com.png" alt="">
              </div>
              <p class="mb-0 ms-3">
                Awarded as "The best English language training institute in Pune"
              </p>
            </div>
          </div>

          <div class="feature-card mb-4">
            <div class="d-flex align-items-center">
              <div class="icon-box">
                <img src="../../../../assets/learning-student_svgrepo.com (1).png" alt="">
              </div>
              <p class="mb-0 ms-3">2000+ Student Trained</p>
            </div>
          </div>

          <div class="feature-card mb-4">
            <div class="d-flex align-items-center">
              <div class="icon-box">
                <img src="../../../../assets/reading-student_icon.png" alt="">
              </div>
              <p class="mb-0 ms-3">100% Practical Learning</p>
            </div>
          </div>

          <div class="feature-card mb-4">
            <div class="d-flex align-items-center">
              <div class="icon-box">
                <img src="../../../../assets/teacher_icon.png" alt="">
              </div>
              <p class="mb-0 ms-3">20+ Faculties</p>
            </div>
          </div>

          <div class="feature-card">
            <div class="d-flex align-items-center">
              <div class="icon-box">
                <img src="../../../../assets/video-call-webcam_icon.png" alt="">
              </div>
              <p class="mb-0 ms-3">
                Personal 1 on 1 Online Spoken English Class
              </p>
            </div>
          </div>

        </div>
      </div>

      <div class="col-lg-6 mb-4">
        <div class="right-card">
          <!-- Form -->
          <form [formGroup]="registrationForm">

            <div class="row">

              <!-- First Name -->
              <div class="col-md-6 mb-4">
                <label class="form-label fw-semibold">
                  First Name <span class="text-danger">*</span>
                </label>
                <input type="text" class="form-control custom-input" placeholder="Type your first name"
                  formControlName="firstName">
              </div>

              <!-- Last Name -->
              <div class="col-md-6 mb-4">
                <label class="form-label fw-semibold">Last Name</label>
                <input type="text" class="form-control custom-input" placeholder="Type your last name"
                  formControlName="lastName">
              </div>

              <!-- Contact Number -->
              <div class="col-md-6 mb-4">
                <label class="form-label fw-semibold">
                  Contact Number <span class="text-danger">*</span>
                </label>
                <input type="tel" class="form-control custom-input" placeholder="e.g. 9423165720"
                  formControlName="contactNumber">
              </div>

              <!-- Email -->
              <div class="col-md-6 mb-4">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control custom-input" placeholder="example@gmail.com"
                  formControlName="email">
              </div>

              <!-- Password -->
              <div class="col-md-6 mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control custom-input" placeholder="Enter password"
                  formControlName="password">
              </div>

              <!-- Confirm Password -->
              <div class="col-md-6 mb-4">
                <label class="form-label fw-semibold">Confirm Password</label>
                <input type="password" class="form-control custom-input" placeholder="Confirm password"
                  formControlName="confirmPassword">
              </div>

              <!-- Date of Birth -->
              <!-- <div class="col-md-6 mb-4">
                <label class="form-label fw-semibold">
                  Date of Birth <span class="text-danger">*</span>
                </label>
                <input type="date" class="form-control custom-input" formControlName="dob">
              </div> -->

              <!-- District -->
              <div class="col-md-6 mb-4">
                <label class="form-label fw-semibold">
                  District <span class="text-danger">*</span>
                </label>

                <select class="form-select custom-input" formControlName="district">
                  <option value="">Select District</option>
                  <option value="pune">Pune</option>
                  <option value="mumbai">Mumbai</option>
                  <option value="kolhapur">Kolhapur</option>
                </select>
              </div>

              <!-- Qualification -->
              <div class="col-12 mb-4">
                <label class="form-label fw-semibold">Qualification</label>

                <select class="form-select custom-input" formControlName="qualification">
                  <option value="">Select Qualification</option>
                  <option value="10th">10th</option>
                  <option value="12th">12th</option>
                  <option value="Btech">B.Tech</option>
                  <option value="Graduate">Graduate</option>
                </select>
              </div>

              <!-- Occupation -->
              <div class="col-12 mb-4">
                <label class="form-label fw-semibold">Occupation</label>

                <select class="form-select custom-input" formControlName="occupation">
                  <option value="">Select Occupation</option>
                  <option value="Student">Student</option>
                  <option value="Business">Business</option>
                  <option value="Employee">Employee</option>
                </select>
              </div>

            </div>

          </form>



        </div>

        <div class="buttons d-flex justify-content-between pt-4 w-100">
          <button>back</button>
          <button type="button" (click)="onSubmit()" style="width: 140;
height: 38;
gap: 4px;
opacity: 1;
padding-top: 8px;
padding-right: 24px;
padding-bottom: 8px;
padding-left: 24px;
border-radius: 50px;
background: linear-gradient(90.47deg, #4687FB 0%, #9050E0 100%);
color: white;
border: none;
">register</button>
        </div>

      </div>
    </div>
  </div>

</div>
