<div class="login-page">
  <div class="login-card ">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="../../../../assets/speakFast-logo.png" alt="Speak Fast's English Academy Logo">
    </div>

    <!-- Heading -->
    <h1 class="welcome-heading">Reset Password</h1>
    <p class="welcome-subtext">Create a new password for your account.</p>

    <form (ngSubmit)="onSubmit()">

      <!-- Password -->
      <div class="password-wrapper">
        <label style="font-size:18px;">Password</label>

        <div class="position-relative mt-2">
          <input [type]="showPassword ? 'text' : 'password'" class="form-control pe-5"
            [(ngModel)]="newPassword" name="newPassword"
            placeholder="Enter your password ">

          <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'" (click)="togglePassword()">
          </i>
        </div>
      </div>

      <!--Confirm Password -->
      <div class="password-wrapper">
        <label style="font-size:18px;">Confirm Password</label>

        <div class="position-relative mt-2">
          <input type="password" class="form-control pe-5"
            [(ngModel)]="confirmPassword" name="confirmPassword"
            placeholder="Confirm your password">
        </div>
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage" style="color: red; margin-top: 10px; font-size: 14px;">
        {{ errorMessage }}
      </div>

      <!-- Reset Button -->
      <button mat-raised-button type="submit" class="btn-login w-100 text-white" [disabled]="isLoading">
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>

    </form>

  </div>

</div>
