<section class="hero">
  <!-- LEFT COLUMN -->
  <div class="hero-left">
    <button class="pill-badge" type="button">Find Your Perfect Teacher</button>

    <h1 class="hero-title"><span class="highlight">One-on-One</span> Training</h1>

    <div class="feature-row">
      <div class="feature-chip">
        <img src="assets/avatar1.jpg" alt="" class="chip-avatar" />
        <span>Certified<br />Teacher</span>
      </div>
      <div class="feature-chip">
        <span class="chip-icon-wrap">
          <mat-icon class="chip-icon">event_available</mat-icon>
        </span>
        <span>Flexible<br />Schedules</span>
      </div>
    </div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="hero-right">
    <div class="award-card">
      <div class="award-badge">
        <mat-icon>military_tech</mat-icon>
      </div>
      <p class="award-text">
        We have <span class="highlight-inline">50+</span><br />Winning Awards
      </p>
    </div>

    <div class="photo-stack">
      <div class="photo-card photo-back">
        <img src="../../../assets/regist.png" alt="Teacher on a video call" />
        <div class="call-pill">
          <button class="round-btn video" aria-label="Video call">
            <mat-icon>videocam</mat-icon>
          </button>
          <button class="round-btn call" aria-label="Voice call">
            <mat-icon>call</mat-icon>
          </button>
        </div>
      </div>

      <div class="live-classes-card">
        <span class="live-label">Live Classes</span>
        <div class="avatar-stack">
          <img src="assets/avatar1.jpg" alt="" />
          <img src="assets/avatar2.jpg" alt="" />
          <img src="assets/avatar3.jpg" alt="" />
          <span class="more-count">+3</span>
        </div>
      </div>

      <div class="rating-card">
        <mat-icon class="star-icon">star</mat-icon>
        <div>
          <div class="rating-value">4.8/5</div>
          <div class="rating-subtext">From 200+ students</div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- BOOKING CARD -->
<div class="booking-card">
  <h3 class="booking-title">When do you want to start</h3>

  <div class="booking-fields">
    <!-- DATE FIELD -->
    <div class="field-box date-box" (click)="picker.open()">
      <mat-icon class="field-icon">calendar_today</mat-icon>
      <div class="field-text">
        <span class="field-label">Date</span>
        <span class="field-value">{{ selectedDate | date: 'dd MMMM yyyy' }}</span>
      </div>

      <!-- hidden input drives the Material datepicker, anchored inside this box -->
      <input
        class="hidden-date-input"
        [matDatepicker]="picker"
        [value]="selectedDate"
        (dateChange)="onDateChange($event)"
        readonly
      />
      <mat-datepicker #picker panelClass="booking-datepicker-panel"></mat-datepicker>
    </div>

    <!-- TIME FIELD -->
    <div class="field-box time-box" [matMenuTriggerFor]="timeMenu">
      <mat-icon class="field-icon time-icon">schedule</mat-icon>
      <div class="field-text">
        <span class="field-value" [class.placeholder]="!selectedTime">
          {{ selectedTime || 'Select Time' }}
        </span>
      </div>
    </div>

    <mat-menu #timeMenu="matMenu" class="booking-time-menu">
      <button mat-menu-item *ngFor="let slot of timeSlots" (click)="selectTime(slot)">
        {{ slot }}
      </button>
    </mat-menu>
  </div>
</div>
