<div class="manage-teachers">
  <!-- Header -->
  <div class="header">
    <div class="header__title">
      <h1>Manage Teachers</h1>
      <span class="header__subtitle">Total: {{ totalTeachers }} teachers</span>
    </div>

    <div class="header__actions">
      <mat-form-field appearance="outline" class="search-field">
        <mat-icon matPrefix class="search-icon">search</mat-icon>
        <input
          matInput
          type="text"
          placeholder="Search Teachers..."
          [(ngModel)]="searchTerm"
        />
        <mat-icon matSuffix class="filter-icon">tune</mat-icon>
      </mat-form-field>
    <div class="page-wrapper">
        <button class="add-teacher-btn" (click)="openDrawer()">+ Add Teacher</button>
    
        <app-add-teacher-dialog [isOpen]="drawerOpen" (closeDrawer)="onDrawerClose()"
            (addTeacher)="onTeacherAdded($event)"></app-add-teacher-dialog>
    </div>
    </div>
  </div>

  <!-- Teacher List -->
  <div class="teacher-list">

    <!-- Loading state -->
    <div class="empty-state" *ngIf="loading">
      <p>Loading teachers...</p>
    </div>

    <div class="teacher-card" *ngFor="let teacher of filteredTeachers">
      <div class="teacher-card__main">
        <div class="avatar">
          <mat-icon>person</mat-icon>
        </div>

        <div class="teacher-info">
          <div class="teacher-info__name-row">
            <span class="teacher-name">{{ teacher.firstName }} {{ teacher.lastName }}</span>
          </div>
          <span class="teacher-subjects">{{ teacher.email }}</span>
        </div>
      </div>
    </div>

    <!-- Empty state (only after loading finishes) -->
    <div class="empty-state" *ngIf="!loading && filteredTeachers.length === 0">
      <mat-icon>search_off</mat-icon>
      <p>No teachers match your search.</p>
    </div>
  </div>
</div>
