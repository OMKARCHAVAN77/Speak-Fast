<div class="dashboard">

  <!-- ===== Header ===== -->
  <header class="dashboard-header">
    <div class="header-top">
      <button mat-stroked-button class="admin-panel-btn">
        <mat-icon>settings</mat-icon>
        <span>Admin Panel</span>
      </button>

      <button mat-icon-button class="notif-btn" matTooltip="Notifications">
        <mat-icon>notifications_none</mat-icon>
      </button>
    </div>

    <h1 class="header-title">Agency Dashboard</h1>
    <p class="header-subtitle">Manage your teaching agency efficiently</p>
  </header>

  <!-- ===== Stats ===== -->
  <section class="stats-section" >
    <div class="stats-grid" >
      @for (stat of stats; track stat.label) {
      <mat-card class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon-wrap">
            <mat-icon>{{ stat.icon }}</mat-icon>
          </div>
          <div class="stat-trend">
            <mat-icon>trending_up</mat-icon>
          </div>
        </div>
        <p class="stat-label">{{ stat.label }}</p>
        <p class="stat-value">{{ stat.value }}</p>
        <p class="stat-sublabel">{{ stat.sublabel }}</p>
      </mat-card>
      }
    </div>
  </section>

  <!-- ===== Tabs ===== -->
  <section class="tabs" >
    <nav class="tabs-bar" >
      <div class="tabs-scroll">

        <a routerLink="recentEnrollments" routerLinkActive="active" rout class="tab-pill" >All Students</a>
        <a routerLink="upcomingBatches" routerLinkActive="active" class="tab-pill">Upcoming Batches</a>
        <a routerLink="adminTeachers"  routerLinkActive="active" class="tab-pill">Teachers</a>
        <!-- <a routerLink="AllStudents" routerLinkActive="active" class="tab-pill">All Students</a> -->
      </div>
    </nav>

    <!-- ===== Content ===== -->
    <section class="content-card" >
      <router-outlet></router-outlet>
    </section>
  </section>
</div>
