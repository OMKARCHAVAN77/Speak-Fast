<div class="login-page">


  <div class="login-card " >
    <!-- Logo -->
    <div class="logo-wrap">
      <img src="../../../../assets/speakFast-logo.png" alt="Speak Fast's English Academy Logo">
    </div>

    <!-- Heading -->
    <h1 class="welcome-heading" >Welcome Back!</h1>
    <p class="welcome-subtext" >The best English language training institute in Pune</p>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">

      <mat-radio-group [(ngModel)]="selectedRole" name="role">
  <mat-radio-button value="teacher">Teacher</mat-radio-button>
  <mat-radio-button value="admin">Admin</mat-radio-button>
</mat-radio-group>

      <!-- Email -->

      <div class="email-wrapper" >
        <Label id="email-" >Email Address</Label>
        <input for="email-" type="text"  name="email" placeholder="Enter your email here">
      </div>

      <!-- Password -->
      <div class="password-wrapper">
        <label >Password</label>

        <div class="position-relative ">
          <input [type]="showPassword ? 'text' : 'password'" class="form-control"

            placeholder="Enter your password" >

          <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'" (click)="togglePassword()" >
          </i>
        </div>
      </div>

      <!-- Error Message -->
      <!-- <div class="error-message" *ngIf="errorMessage" style="color: red; margin-top: 10px; font-size: 14px;">
        {{ errorMessage }}
      </div> -->

      <!-- Remember me / Forgot password -->
      <div class="check-out-wrapper top-row" >
        <div class="mb-3 form-check" >
          <input type="checkbox" class="form-check-input" id="exampleCheck1" [(ngModel)]="rememberMe" name="rememberMe">
          <label class="form-check-label" for="exampleCheck1">Remember me</label>
        </div>

        <a routerLink="/forgotPassword" class="forgot-link"
          (click)="onForgotPassword()">
          Forgot password?
        </a>
      </div>

      <!-- Login Button -->
      <button mat-raised-button type="submit" class="btn-login w-100" [disabled]="isLoading">
        <div class="text-white">
          {{ isLoading ? 'Logging in...' : 'Login' }}&nbsp;<mat-icon class="text-white">arrow_forward</mat-icon>
        </div>
      </button>

    </form>

  </div>


</div>
