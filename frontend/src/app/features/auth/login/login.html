<div class="login-page">


  <div class="login-card " >
    <!-- Logo -->
    <div class="logo-wrap">
      <img src="../../../../assets/speakFast-logo.png" alt="Speak Fast's English Academy Logo">
    </div>

    <!-- Heading -->
    <h1 class="welcome-heading" >Welcome Back!</h1>
    <p class="welcome-subtext" >The best English language training institute in Pune</p>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">

      <!-- Email -->

      <div class="email-wrapper" >
        <Label style="font-size: 18px;">Email Address</Label>
        <input type="text"  placeholder="Enter your email here">
      </div>

      <!-- Password -->
      <div class="password-wrapper">
        <label style="font-size:18px;">Password</label>

        <div class="position-relative mt-2">
          <input [type]="showPassword ? 'text' : 'password'" class="form-control pe-5"
            placeholder="Enter your password here" >

          <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'" (click)="togglePassword()" >
          </i>
        </div>
      </div>

      <!-- Remember me / Forgot password -->
      <div class="check-out-wrapper top-row" >
        <div class="mb-3 form-check" >
          <input type="checkbox" class="form-check-input" id="exampleCheck1">
          <label class="form-check-label" for="exampleCheck1">Check me out</label>
        </div>

        <a href="javascript:void(0)" class="forgot-link"
          (click)="onForgotPassword()">
          Forgot password?
        </a>
      </div>

      <!-- Login Button -->
      <button mat-raised-button type="submit" class="btn-login w-100 " >
        <div class="text-white" > Login&nbsp;<mat-icon
            class="text-white">arrow_forward</mat-icon>
        </div>

      </button>

    </form>

  </div>


</div>
