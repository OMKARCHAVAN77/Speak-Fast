<!-- Logo -->
<div class="logo-wrap">
  <img src="../../../../assets/speakFast-logo.png" alt="Speak Fast's English Academy Logo">
</div>

<!-- Heading -->
<h1 class="welcome-heading">Reset Password</h1>
<p class="welcome-subtext">Create a new password for your account.</p>

<form>



  <!-- Password -->
  <div class="password-wrapper">
    <label style="font-size:18px;">Password</label>

    <div class="position-relative mt-2">
      <input [type]="showPassword ? 'text' : 'password'" class="form-control pe-5"
        placeholder="Enter your password ">

      <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'" (click)="togglePassword()">
      </i>
    </div>
  </div>

  <!--Confirm Password -->
  <div class="password-wrapper">
    <label style="font-size:18px;">Confirm Password</label>

    <div class="position-relative mt-2">
      <input type="password" class="form-control pe-5" placeholder="Confirm your password">

      <!-- <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'" (click)="togglePassword()" > -->

    </div>
  </div>



  <!-- Reset Button -->
  <button mat-raised-button routerLink="/forgotPassword/passwordChanged" type="submit" class="btn-login w-100 text-white ">
    Reset Password
  </button>

</form>
