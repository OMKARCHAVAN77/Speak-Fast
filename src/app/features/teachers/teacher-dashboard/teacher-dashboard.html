<div class="dashboard-wrapper">

  <!-- Blue hero banner -->
  <header class="hero-banner">
    <div class="hero-content">
      <h1 class="welcome-title">Welcome, {{ teacherName }}!</h1>
      <p class="welcome-subtitle">Manage your teachings efficiently</p>
    </div>

    <div class="hero-actions">
      <button mat-icon-button class="icon-btn" aria-label="Notifications">
        <mat-icon>notifications_none</mat-icon>
      </button>

      <button mat-stroked-button class="request-leave-btn">
        <mat-icon class="btn-icon">person_add_alt</mat-icon>
        <span>Request Leave</span>
      </button>
    </div>
  </header>

  <!-- Stat cards + tab bar -->
  <section class="stats-section">
    <div class="stats-row">
      <div class="stat-card" *ngFor="let stat of stats">
        <div class="stat-icon">
          <mat-icon>{{ stat.icon }}</mat-icon>
        </div>
        <div class="stat-text">
          <div class="stat-value">{{ stat.value }}</div>
          <div class="stat-label">{{ stat.label }}</div>
        </div>
      </div>
    </div>

    <nav class="tab-bar">
      <button
        type="button"
        class="tab-item"
        *ngFor="let tab of tabs"
        [class.active]="activeTab === tab"
        (click)="selectTab(tab)">
        {{ tab }}
      </button>
    </nav>
  </section>

</div>
