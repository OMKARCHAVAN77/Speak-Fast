<div class="page">
  <div class="wrapper">

    <!-- Progress header -->
    <div class="progress-card">
      <div class="progress-row">
        <span class="progress-label">Question {{ currentIndex + 1 }} of {{ totalQuestions }}</span>
        <span class="progress-count">{{ answeredCount }} answered</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" [style.width.%]="progressPercent"></div>
      </div>
    </div>

    <!-- Question card -->
    <div class="question-card">
      <p class="category">{{ currentQuestion.category }}</p>
      <p class="question-text">{{ currentQuestion.text }}</p>

      <div class="options">
        <button
          type="button"
          class="option"
          *ngFor="let option of currentQuestion.options; let i = index"
          [class.selected]="selectedOption === i"
          (click)="selectOption(i)">
          {{ option }}
        </button>
      </div>
    </div>

    <!-- Footer nav -->
    <div class="footer-nav">
      <button
        type="button"
        class="btn-previous"
        [disabled]="currentIndex === 0"
        (click)="goPrevious()">
        <span class="arrow-left">&#8592;</span> Previous
      </button>

      <button
        type="button"
        class="btn-next"
        (click)="goNextOrFinish()">
        <span>{{ isLastQuestion ? 'Done' : 'Next' }}</span>
        <span class="arrow-right">&#8594;</span>
      </button>
    </div>

  </div>
</div>
