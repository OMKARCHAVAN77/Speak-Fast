<!-- Hero Section -->

<section class="hero">

  <div class="hero-content">

    <h1>Complete Your Registration</h1>

    <p>
      Just one more step to start your English learning journey!
    </p>

  </div>

</section>

<!-- Registration Form -->

<section class="registration-section">

  <div class="registration-card">

    <form
      [formGroup]="registrationForm"
      (ngSubmit)="onSubmit()">

      <!-- Full Name -->
      <div class="row">

        <div class="form-group">
          <label>First Name*</label>
          <input type="text" placeholder="First Name" formControlName="firstname">
          <small class="error" *ngIf="f['firstname'].touched && f['firstname'].invalid">
            First Name is required
          </small>
        </div>

        <div class="form-group">
          <label>Last Name*</label>
          <input type="text" placeholder="Last Name" formControlName="lastname">
          <small class="error" *ngIf="f['lastname'].touched && f['lastname'].invalid">
            Last Name is required
          </small>
        </div>

      </div>

      

      <!-- Row -->

      <div class="row">

        <div class="form-group">

          <label>Phone Number *</label>

          <input
            type="text"
            placeholder="e.g. 9876543210"
            formControlName="mobile">

          <small
            class="error"
            *ngIf="f['mobile'].touched && f['mobile'].invalid">

            Enter valid mobile number

          </small>

        </div>

        <div class="form-group">

          <label>Email</label>

          <input
            type="email"
            placeholder="@gmail.com"
            formControlName="email">

          <small
            class="error"
            *ngIf="f['email'].touched && f['email'].invalid">

            Enter valid email

          </small>

        </div>
      </div>

      <!-- password  -->
       <div class="row">
        <div class="form-group">

          <label>Password</label>

          <input
            type="password"
            placeholder="Enter password"
            formControlName="password">

          <small
            class="error"
            *ngIf="f['password'].touched && f['password'].invalid">

            Enter valid password

          </small>

        </div>
         <div class="form-group">

          <label> Confirm password</label>

          <input
            type="text"
            placeholder="Confirm password"
            formControlName="confirmPassword">

          <small
            class="error"
            *ngIf="f['confirmPassword'].touched && f['confirmPassword'].invalid">

            password does not match

          </small>

        </div>
      </div>
     
      <!-- Row -->

      <div class="">

        <!-- <div class="form-group">

          <label>Date of Birth *</label>

          <input
            type="date"
            formControlName="dob">

        </div> -->

        <div class="form-group">

          <label>District*</label>

          <select formControlName="district">

            <option value="">
              Select District
            </option>

            <option
              *ngFor="let district of districts"
              [value]="district">

              {{ district }}

            </option>

          </select>

        </div>

      </div>

      <!-- Qualification -->

      <div class="form-group">

        <label>Qualification</label>

        <select formControlName="qualification">

          <option value="">
            Select Qualification
          </option>

          <option
            *ngFor="let q of qualifications"
            [value]="q">

            {{ q }}

          </option>

        </select>

      </div>

      <!-- Occupation -->

      <div class="form-group">

        <label>Occupation</label>

        <select formControlName="occupation">

          <option value="">
            Select Occupation
          </option>

          <option
            *ngFor="let item of occupations"
            [value]="item">

            {{ item }}

          </option>

        </select>

      </div>

      <!-- Buttons -->

      <div class="button-group">

        <button
          type="button"
          class="back-btn"
          (click)="back()">

          ← Back

        </button>

        <button
          type="submit"
          class="dashboard-btn">

          Dashboard →

        </button>

      </div>

    </form>

  </div>

</section>
