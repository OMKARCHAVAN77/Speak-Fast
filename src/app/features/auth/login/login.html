<div class="page">

  <div class="brand-badge">Speak Fast Academy</div>

  <h1 class="welcome-title">Welcome Back!</h1>
  <p class="welcome-subtitle">Choose your account type to continue</p>

  <div class="card">

    <div class="icon-circle">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4.5C4 3.67157 4.67157 3 5.5 3H11V21H5.5C4.67157 21 4 20.3284 4 19.5V4.5Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M20 4.5C20 3.67157 19.3284 3 18.5 3H13V21H18.5C19.3284 21 20 20.3284 20 19.5V4.5Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
    </div>

    <h2 class="card-title">{{ currentTitle }}</h2>
    <p class="card-subtitle">Enter your credentials to continue</p>

      <label class="radio-option">

    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" novalidate>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          name="email"
          class="text-input"
          [(ngModel)]="email"
          #emailRef="ngModel"
          required
          email
        />
        <div class="field-error" *ngIf="emailRef.invalid && emailRef.touched">
          <span *ngIf="emailRef.errors?.['required']">Email is required</span>
          <span *ngIf="emailRef.errors?.['email']">Enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          name="password"
          class="text-input"
          [(ngModel)]="password"
          #passwordRef="ngModel"
          required
          minlength="6"
        />
        <div class="field-error" *ngIf="passwordRef.invalid && passwordRef.touched">
          <span *ngIf="passwordRef.errors?.['required']">Password is required</span>
          <span *ngIf="passwordRef.errors?.['minlength']">At least 6 characters</span>
        </div>
      </div>

      <div class="options-row">
        <label class="remember-me">
          <input type="checkbox" name="rememberMe" [(ngModel)]="rememberMe" />
          <span>Remember me</span>
        </label>

        <a href="javascript:void(0)" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="sign-up-btn">
        <span class="plus">+</span> Sign Up
      </button>

      <button type="button" class="back-btn" (click)="goBack()">
        <span class="arrow">←</span> Back to user type selection
      </button>

    </form>

  </div>

  <p class="footer-text">
    Don't have an account? <a href="javascript:void(0)" class="footer-link">Sign up</a>
  </p>

</div>
