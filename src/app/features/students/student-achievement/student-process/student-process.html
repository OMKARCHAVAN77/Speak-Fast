<div class="class-list">
  <article class="class-row" *ngFor="let session of classes">

    <div class="class-main">
      <div class="avatar" aria-hidden="true">
        <mat-icon>person</mat-icon>
      </div>

      <div class="class-info">
        <h3 class="student-name">{{ session.name }}</h3>
        <p class="subject">{{ session.subject }}</p>

        <div class="meta">
          <span class="meta-item">
            <mat-icon>calendar_today</mat-icon>
            {{ session.day }}
          </span>
          <span class="meta-item">
            <mat-icon>schedule</mat-icon>
            {{ session.time }}
          </span>
        </div>

        <button type="button" class="join-btn" (click)="joinClass(session)">
          <mat-icon>videocam</mat-icon>
          Join
        </button>
      </div>
    </div>

    <span class="status-badge" [class.confirmed]="session.status === 'confirmed'"
      [class.pending]="session.status === 'pending'">
      {{ session.status }}
    </span>

  </article>
</div>
