<mat-toolbar class="navbar">
  <div class="navbar-container">

    <!-- Logo -->
<div class="logo-section">
  <img 
    src="assets/speakfast.png" 
    alt="Speak Fast Logo" 
    class="logo-image"
  />
</div>

    <!-- Nav Links -->
    <nav class="nav-links">
      <a routerLink="/home">  Home  </a>
      <a routerLink="/teachers"  routerLinkActive="active">  Teachers  </a>
      <a routerLink="/courses" routerLinkActive="active">  Courses  </a>
      <a routerLink="/grammer"  routerLinkActive="active">  Grammar Test  </a>
    </nav>

    <!-- Actions -->
    <div class="actions-section">
      <button mat-stroked-button class="call-btn" (click)="onCallNow()">
        <mat-icon class="call-icon">call</mat-icon>
        Call Now
      </button>

      <button mat-flat-button class="login-btn" (click)="onLogIn()">
        Log In
      </button>
    </div>

  </div>

  <div class="bottom-bar"></div>
</mat-toolbar>
