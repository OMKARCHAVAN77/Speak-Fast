<mat-toolbar class="navbar">
  <div class="navbar-container">

    <!-- Logo -->
<div class="logo-section">
  <a routerLink="/home" class="logo-section">
      <img src="assets/speakfast.png" alt="Speak Fast Logo" class="logo-image">
  </a>
</div>

    <!-- Nav Links -->
    <nav class="nav-links" [class.open]="isMenuOpen">
  <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link" (click)="closeMenu()">Home</a>
  <a routerLink="/teachers" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link" (click)="closeMenu()">Teachers</a>
  <a routerLink="/courses" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link" (click)="closeMenu()">Courses</a>
  <a routerLink="/grammer" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link" (click)="closeMenu()">Grammar Test</a>
</nav>

    <!-- Actions -->
    <div class="actions-section">
      <button mat-stroked-button class="call-btn" (click)="onCallNow()">
        <mat-icon class="call-icon">call</mat-icon>
        Call Now
      </button>

      <button mat-flat-button class="login-btn" (click)="onLogIn()">
        Log In
      </button>

      <button class="menu-toggle-btn" (click)="toggleMenu()" aria-label="Toggle menu">
        <mat-icon>{{ isMenuOpen ? 'close' : 'menu' }}</mat-icon>
      </button>
    </div>

  </div>

  <div class="bottom-bar"></div>
</mat-toolbar>
